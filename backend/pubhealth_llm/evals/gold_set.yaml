# backend/pubhealth_llm/evals/gold_set.yaml
# 27-item labeled evaluation set for pubHealthLLM.
# Data sources: cdc_places (CDC PLACES 2023), mmwr (S3 Vectors, 9 PDFs),
#               mortality (NCHS 2017), none (out-of-domain / abstain).
# Values confirmed from live Aurora + S3 Vectors queries (2026-07-03).

items:

  # -----------------------------------------------------------------------
  # CDC PLACES — numeric retrieval (10 items)
  # -----------------------------------------------------------------------

  - id: places_001
    question: "What is the diabetes prevalence in Travis County, TX?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_health_statistics]
    expected_facts:
      - metric: "Diabetes"
        location: "Travis County, TX"
        expected_value: 9.0
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should report crude diabetes prevalence ~9.0% for Travis County TX with CI 7.8–10.2. No invented values."

  - id: places_002
    question: "What is the obesity rate in Travis County, TX?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_health_statistics]
    expected_facts:
      - metric: "Obesity"
        location: "Travis County, TX"
        expected_value: 30.4
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should report crude obesity ~30.4% for Travis County TX with CI 26.7–34.3."

  - id: places_003
    question: "What is the obesity rate in Cook County, IL?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_health_statistics]
    expected_facts:
      - metric: "Obesity"
        location: "Cook County, IL"
        expected_value: 31.0
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should report crude obesity ~31.0% for Cook County IL."

  - id: places_004
    question: "What is the current smoking prevalence in Harris County, TX?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_health_statistics]
    expected_facts:
      - metric: "Current Smoking"
        location: "Harris County, TX"
        expected_value: 12.7
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should report smoking ~12.7% for Harris County TX."

  - id: places_005
    question: "Which counties in Texas have the highest diabetes rates?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_worst_counties_by_measure]
    expected_facts:
      - metric: "Diabetes"
        location: "Dimmit, TX"
        expected_value: 23.4
        tolerance: 1.0
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Top county should be Dimmit (~23.4%), Jim Hogg (~22.8%), Zavala (~22.6%). Response should contain a ranked table."

  - id: places_006
    question: "Which counties in Texas have the highest smoking rates?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_worst_counties_by_measure]
    expected_facts:
      - metric: "Current Smoking"
        location: "San Augustine, TX"
        expected_value: 22.9
        tolerance: 1.0
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Top county should be San Augustine (~22.9%). Response should be a ranked table."

  - id: places_007
    question: "Compare obesity rates between Travis County, TX and Harris County, TX."
    data_sources: [cdc_places]
    expected_tools: [tool_compare_locations]
    expected_facts:
      - metric: "Obesity"
        location: "Travis County, TX"
        expected_value: 30.4
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should compare both counties. Travis ~30.4%, Harris value should also appear. No fabricated comparison."

  - id: places_008
    question: "What is the diabetes rate in Travis County with confidence intervals?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_health_statistics]
    expected_facts:
      - metric: "Diabetes"
        location: "Travis County, TX"
        expected_value: 9.0
        tolerance: 0.5
        unit: "% of adults"
        year: 2023
    expected_source_ids: []
    is_answerable: true
    rubric: "Should include 95% CI (7.8–10.2). Response should explicitly mention CI bounds."

  - id: places_009
    question: "Which Texas counties have the highest combined burden of diabetes and obesity?"
    data_sources: [cdc_places]
    expected_tools: [tool_rank_counties_composite]
    expected_facts: []
    expected_source_ids: []
    is_answerable: true
    rubric: "Should call composite ranking tool. Output should include 'Composite' score column. No single-measure tool substitution."

  - id: places_010
    question: "What health measures does CDC PLACES track?"
    data_sources: [cdc_places]
    expected_tools: [tool_get_available_measures]
    expected_facts: []
    expected_source_ids: []
    is_answerable: true
    rubric: "Should list available measures grouped by category. No fabrication — all from the measures table."

