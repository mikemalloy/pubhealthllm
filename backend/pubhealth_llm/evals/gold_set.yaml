  # -----------------------------------------------------------------------
  # NCHS Mortality — numeric (5 items)
  # -----------------------------------------------------------------------

  - id: mort_001
    question: "What is the diabetes mortality rate in Texas?"
    data_sources: [mortality]
    expected_tools: [tool_get_mortality_data]
    expected_facts:
      - metric: "Diabetes mortality"
        location: "Texas"
        expected_value: 21.2
        tolerance: 1.0
        unit: "per 100k (age-adjusted)"
        year: 2017
    expected_source_ids: []
    is_answerable: true
    rubric: "Age-adjusted diabetes mortality rate for TX should be ~21.2/100k (2017). Deaths ~5,832."

  - id: mort_002
    question: "What is the heart disease mortality rate in Louisiana?"
    data_sources: [mortality]
