        tolerance: 2.0
        unit: "per 100k (age-adjusted)"
        year: 2017
    expected_source_ids: []
    is_answerable: true
    rubric: "Age-adjusted heart disease mortality for LA should be ~214.4/100k. Deaths ~11,260."

